name: security

# Free vulnerability scanning:
#   • Trivy   — dependency CVEs + hardcoded secrets
#   • Semgrep — static analysis (SAST) for JS/TS/React
#   • Gitleaks— secrets committed to git history (.env allowlisted via .gitleaks.toml)
#   • npm audit — known vulns in npm dependencies
#
# ENFORCING since Sprint 6.4 (2026-06-05): all four scan jobs block PRs on findings —
# baseline is fully clean (first run: trivy 0 · semgrep 0 · gitleaks 0 · npm audit 0 high).
# Only the SARIF upload steps stay tolerant (private repo without GHAS → upload 403s by design).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # weekly Mon 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy (deps · secrets)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        # self-hosted: ставим в ~/.local/bin (без sudo) и добавляем в PATH джобы
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Scan (table → log)
        run: |
          trivy fs --scanners vuln,secret --severity HIGH,CRITICAL \
            --ignore-unfixed --skip-dirs node_modules,dist --no-progress --exit-code 1 .
      - name: Scan (SARIF → Security tab)
        continue-on-error: true
        run: |
          trivy fs --scanners vuln,secret --severity HIGH,CRITICAL \
            --ignore-unfixed --skip-dirs node_modules,dist --no-progress \
            --format sarif --output trivy.sarif .
      - uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy.sarif
          category: trivy

  semgrep:
    name: Semgrep (SAST)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install Semgrep (venv)
        # self-hosted: системный pip закрыт PEP 668 — ставим в одноразовый venv
        run: |
          python3 -m venv "$RUNNER_TEMP/semgrep-venv"
          "$RUNNER_TEMP/semgrep-venv/bin/pip" install --quiet semgrep
          echo "$RUNNER_TEMP/semgrep-venv/bin" >> "$GITHUB_PATH"
      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/security-audit --config p/secrets \
            --config p/javascript --config p/typescript --config p/react \
            --metrics off --error \
            --sarif --output semgrep.sarif \
            --exclude node_modules --exclude dist
      - uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  gitleaks:
    name: Gitleaks (secrets in history)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks && install -D gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run Gitleaks
        run: gitleaks git . --redact --no-banner --exit-code 1

  npm-audit:
    name: npm audit (dependencies)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm audit
        run: npm audit --audit-level=high

name: ci

# Гейт type / lint / test / build. Деплой остаётся за actr-pipeline (SRV199,
# rsync standalone-артефакта на SRVACTR01) — этот workflow непроходимый
# бэкстоп для пушей мимо конвейера. Выполняется на self-hosted runner.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck · Lint · Test · Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
